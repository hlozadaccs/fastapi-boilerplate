# Exclude patterns for all hooks
exclude: '^(alembic/versions/|tests/|.*\.lock$|.*\.pyc$)'

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Detect-Secrets - Advanced secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: poetry.lock

  # Prettier - Format JSON, YAML, Markdown
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [json, yaml, markdown]
        exclude: ^(poetry.lock|.+\.min\.json)$

  # Pyproject-fmt - Format pyproject.toml
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.6.1
    hooks:
      - id: pyproject-fmt

  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      # Linter
      - id: ruff
        args: [--fix]
      # Formatter
      - id: ruff-format

  # Bandit - Security linter
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^tests/

  # Safety - Check dependencies for known security vulnerabilities
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.3
    hooks:
      - id: python-safety-dependencies-check
        files: pyproject.toml

  # Interrogate - Docstring coverage
  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args: [--fail-under=40, --verbose, --ignore-init-method, --ignore-init-module, --ignore-nested-functions]
        exclude: ^(tests/|alembic/)

  # Vulture - Find dead code
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        args: [--min-confidence=80]
        exclude: ^(tests/|alembic/)

  # Radon - Code complexity metrics
  - repo: local
    hooks:
      - id: radon-cc
        name: radon-cc
        entry: poetry run radon cc
        language: system
        args: [--min, "B", --show-complexity, app/]
        pass_filenames: false
      - id: radon-mi
        name: radon-mi
        entry: poetry run radon mi
        language: system
        args: [--min, "B", app/]
        pass_filenames: false

  # Complexipy - Cognitive complexity
  - repo: https://github.com/rohaquinlop/complexipy-pre-commit
    rev: v4.2.0
    hooks:
      - id: complexipy
        args: ["--max-cognitive-complexity", "10"]

  # Pytest - Run tests (only on test file changes)
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: poetry run pytest
        language: system
        args: ["tests/", "-v", "--tb=short", "-x"]
        pass_filenames: false
        stages: [manual]  # Run manually with: pre-commit run pytest --hook-stage manual

  # MyPy - Static type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-python-jose
          - sqlalchemy[mypy]
        args: [--ignore-missing-imports, --no-strict-optional, --cache-dir=/dev/null]
        files: ^app/
