[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning:pydantic

[coverage:run]
source = app
omit =
    app/__init__.py
    app/scripts/*
    app/main.py

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
